<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Álbum</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body { margin:0; font-family:Arial; background:#e0f7fa; }
#login { text-align:center; padding:40px; display:none; }

.topbar {
  background:#007bff;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

#buscar { width:100%; padding:10px; border:none; }

.barra { position:relative; background:#ccc; height:18px; }

.progreso {
  height:100%;
  width:0%;
  background: repeating-linear-gradient(
    45deg,
    #28a745,
    #28a745 10px,
    #5cd65c 10px,
    #5cd65c 20px
  );
}

#textoProgreso {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.card { background:white; margin:10px; padding:10px; border-radius:10px; }
.grid { display:flex; overflow-x:auto; }
.stamp { min-width:75px; text-align:center; margin:4px; background:#f9f9f9; border-radius:8px; padding:6px; }

.fila { display:flex; justify-content:center; align-items:center; gap:4px; }

.btn { width:24px; height:24px; border:none; border-radius:6px; }
.minus { background:#f44336; color:white; }
.plus { background:#4CAF50; color:white; }

.num { font-weight:bold; }
.valor { font-weight:bold; }

button:disabled { opacity:0.5; }
</style>
</head>

<body>

<div id="login">
  <h2>Acceso</h2>
  <input id="clave" placeholder="Código">
  <button onclick="acceder()">Entrar</button>
</div>

<div id="app" style="display:none">

  <div class="topbar">
    📄 Álbum
    <div>
      <button id="btnEdit" onclick="toggleEdicion()">✏️</button>
      <button id="btnRep" onclick="verRepetidas()">🔁</button>
      <button id="btnFal" onclick="verFaltantes()">❌</button>
    </div>
  </div>

  <input id="buscar" placeholder="Buscar..." onkeyup="filtrar()">

  <div class="barra">
    <div id="progreso" class="progreso"></div>
    <span id="textoProgreso"></span>
  </div>

  <div id="contenedor"></div>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwO1ZvN5lQNsX9VFMCul1oUQgu2cCAZhulwHaNeSOkomidWJeTr0zihUudku9svQx0SNg/exec";

let datos = [];
let cambiosPendientes = [];

let guardando = false;
let editando = false;
let heartbeat = null;

const CLAVE = "201918";

/* LOGIN */
document.addEventListener("DOMContentLoaded", ()=>{
  if(localStorage.getItem("clave") === CLAVE){
    entrar();
  } else {
    login.style.display="block";
  }
});

function acceder(){
  if(clave.value === CLAVE){
    localStorage.setItem("clave", CLAVE);
    entrar();
  }
}

function entrar(){
  login.style.display="none";
  app.style.display="block";
  cargarDatos();
}

/* EDICIÓN */
async function toggleEdicion(){

  if(!editando){
    const r = await fetch(APPS_SCRIPT_URL + "?accion=lock");
    const res = await r.json();

    if(!res.ok){
      alert("🚫 Otro usuario está editando");
      return;
    }

    editando = true;
    btnEdit.innerText = "💾";

    heartbeat = setInterval(()=>{
      fetch(APPS_SCRIPT_URL + "?accion=ping");
    },5000);

  } else {

    await guardarTodo();

    await fetch(APPS_SCRIPT_URL + "?accion=unlock");

    clearInterval(heartbeat);

    editando = false;
    btnEdit.innerText = "✏️";
  }

  render(datos);
}

/* GUARDAR */
async function guardarTodo(){
  if(cambiosPendientes.length===0) return;

  await fetch(APPS_SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify(cambiosPendientes)
  });

  cambiosPendientes=[];
}

/* CARGAR */
async function cargarDatos(){
  const r = await fetch(APPS_SCRIPT_URL + "?accion=get");
  datos = await r.json();
  render(datos);
}

/* RENDER */
function render(lista){
  let html="";

  lista.forEach(e=>{
    html+=`<div class="card">
<b>${e.cod} - ${e.pais}</b>
<div class="grid">`;

    e.estampas.forEach((v,i)=>{
      let n=(e.cod==="FWC")?i:i+1;

      html+=`<div class="stamp">
<span class="num">${n}</span>
<div class="fila">

${editando ? `<button class="btn minus" onclick="modificar('${e.cod}',${i},-1)">−</button>`:""}

<span id="v-${e.cod}-${i}" class="valor">${v}</span>

${editando ? `<button class="btn plus" onclick="modificar('${e.cod}',${i},1)">+</button>`:""}

</div></div>`;
    });

    html+="</div></div>";
  });

  contenedor.innerHTML=html;
  calcularProgreso();
}

/* MODIFICAR */
function modificar(cod,i,c){
  if(!editando) return;

  let e=datos.find(x=>x.cod===cod);

  e.estampas[i]+=c;
  if(e.estampas[i]<0)e.estampas[i]=0;

  document.getElementById(`v-${cod}-${i}`).innerText=e.estampas[i];

  cambiosPendientes.push({cod,index:i,valor:e.estampas[i]});
}

/* SYNC */
setInterval(async ()=>{
  if(editando) return;

  const r=await fetch(APPS_SCRIPT_URL+"?accion=get");
  const nuevos=await r.json();

  nuevos.forEach(n=>{
    let l=datos.find(x=>x.cod===n.cod);

    n.estampas.forEach((v,i)=>{
      if(l.estampas[i]!==v){
        l.estampas[i]=v;
        let el=document.getElementById(`v-${n.cod}-${i}`);
        if(el) el.innerText=v;
      }
    });
  });

  calcularProgreso();

},3000);

/* PROGRESO */
function calcularProgreso(){
  let t=0;

  datos.forEach(e=>{
    e.estampas.forEach(v=>{ if(v>0) t++; });
  });

  let p=Math.round((t/944)*100);

  progreso.style.width=p+"%";
  textoProgreso.innerText = editando ? "Editando…" : p+"%";
}

/* FILTRO */
function filtrar(){
  let q=buscar.value.toLowerCase();
  render(datos.filter(x=>x.cod.toLowerCase().includes(q)||x.pais.toLowerCase().includes(q)));
}

/* LISTAS */
function verRepetidas(){
  if(editando) return alert("Guarda primero");

  let t="*REPETIDAS*\n";

  datos.forEach(e=>{
    let r=[];
    e.estampas.forEach((v,i)=>{if(v>1) r.push((e.cod==="FWC")?i:i+1);});
    if(r.length) t+=e.cod+" "+r.join(", ")+"\n";
  });

  compartir(t);
}

function verFaltantes(){
  if(editando) return alert("Guarda primero");

  let t="*FALTANTES*\n";

  datos.forEach(e=>{
    let f=[];
    e.estampas.forEach((v,i)=>{if(v===0) f.push((e.cod==="FWC")?i:i+1);});
    if(f.length) t+=e.cod+" "+f.join(", ")+"\n";
  });

  compartir(t);
}

/* SHARE */
function compartir(t){
  if(navigator.share){
    navigator.share({text:t});
  }else{
    navigator.clipboard.writeText(t);
    alert("Copiado");
  }
}

/* SW */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
